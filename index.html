<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather Update</title>
  <link rel="icon" type="image/png" href="https://github.com/J-lester27/Weather-Update/blob/e55612e970a64d59681c665c5289579f380e10eb/icons8-day-and-night-50.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">

  <style>
    .weather-app {
      animation: fadeUp 1s ease;
    }

    .search-panel {
      animation: fadeDown 0.8s ease;
    }

    .current-weather {
      animation: fadeLeft 1s ease 0.2s both;
    }

    .forecast-panel {
      animation: fadeRight 1s ease 0.4s both;
    }

    .weather-icon {
      animation: floatIcon 4s ease-in-out infinite;
    }

    .temperature {
      animation: pulseTemp 3s ease-in-out infinite;
    }

    .metric-card {
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .metric-card:hover {
      transform: translateY(-8px) scale(1.03);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.25);
    }

    .search-row button {
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .search-row button:hover {
      transform: scale(1.05);
      box-shadow: 0 10px 30px rgba(94, 224, 194, 0.35);
    }

    .forecast-item {
      transition: transform 0.3s ease, background 0.3s ease;
    }

    .forecast-item:hover {
      transform: translateX(6px);
      background: rgba(255, 255, 255, 0.12);
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(40px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeDown {
      from {
        opacity: 0;
        transform: translateY(-40px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeLeft {
      from {
        opacity: 0;
        transform: translateX(-40px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @keyframes fadeRight {
      from {
        opacity: 0;
        transform: translateX(40px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @keyframes floatIcon {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-10px);
      }
    }

    @keyframes pulseTemp {
      0%, 100% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.03);
      }
    }
  </style>
</head>
<body>
  <main class="weather-app">
    <section class="search-panel" aria-label="Weather search">
      <div>
        <p class="eyebrow">Live Forecast</p>
        <h1>Weather Update</h1>
      </div>

      <form id="weather-form" class="search-form">
        <label for="city-input">Search city</label>
        <div class="search-row">
          <input
            id="city-input"
            type="search"
            placeholder="Philippines, Tokyo, New York..."
            autocomplete="off"
            required
          >
          <button type="submit">Search</button>
        </div>
      </form>
    </section>

    <section class="current-weather" aria-live="polite">
      <div class="location-row">
        <div>
          <p id="location-name" class="location">Loading Cainta</p>
          <p id="updated-time" class="muted">Fetching latest update...</p>
        </div>
        <div id="weather-icon" class="weather-icon" aria-hidden="true">--</div>
      </div>

      <div class="temperature-row">
        <p id="temperature" class="temperature">--</p>
        <div>
          <p id="condition" class="condition">Checking the sky</p>
          <p id="summary" class="muted">
            Wind, humidity, and pressure will appear here.
          </p>
        </div>
      </div>

      <div class="metrics-grid">
        <article class="metric-card wind-card">
          <div>
            <span>Wind</span>
            <strong id="wind">--</strong>
          </div>
          <div class="wind-gauge" aria-hidden="true">
            <span></span>
          </div>
        </article>

        <article class="metric-card humidity-card">
          <div>
            <span>Humidity</span>
            <strong id="humidity">--</strong>
          </div>
          <div class="humidity-bars" aria-hidden="true">
            <i></i><i></i><i></i><i></i><i></i><i></i>
          </div>
        </article>

        <article class="metric-card pressure-card">
          <div>
            <span>Pressure</span>
            <strong id="pressure">--</strong>
          </div>
          <div class="pressure-meter" aria-hidden="true">
            <span></span>
          </div>
        </article>

        <article class="metric-card feels-card">
          <div>
            <span>Feels Like</span>
            <strong id="feels-like">--</strong>
          </div>
          <div class="temperature-ring" aria-hidden="true"></div>
        </article>
      </div>
    </section>

    <section class="forecast-panel">
      <div class="section-header">
        <h2>7-Day Forecast</h2>
        <p id="forecast-note" class="muted">
          Daily outlook updates after search.
        </p>
      </div>
      <div id="forecast-list" class="forecast-list"></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
